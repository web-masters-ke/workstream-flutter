name: workstream
description: "WorkStream agent mobile app — task execution, chat, wallet, and payouts for remote agents."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  intl: ^0.20.1
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^6.0.5
  url_launcher: ^6.3.1
  record: ^6.2.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/
